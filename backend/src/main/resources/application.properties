spring.application.name=waypoint-backend
server.port=8081

# PostgreSQL (dedicated Docker instance on 5544 so it doesn't clash with a native 5432)
spring.datasource.url=jdbc:postgresql://localhost:5544/waypoint
spring.datasource.username=waypoint
spring.datasource.password=waypoint

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# JWT (dev secret — override via env in real deployments). Must be >= 32 bytes for HS256.
app.jwt.secret=waypoint-dev-secret-key-change-me-please-0123456789
app.jwt.expiration-minutes=120
app.cors.allowed-origin=http://localhost:3000

# Demo login seeded on first startup
app.demo-user.username=recruiter
app.demo-user.password=waypoint123
